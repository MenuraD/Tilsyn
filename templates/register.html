<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../static/design/main.css">
    <title>Register</title>
    <script>
        function validateAge() {
            const ageInput = document.getElementById('age');
            const ageError = document.getElementById('age-error');
            const age = parseInt(ageInput.value, 10);

            if (isNaN(age) || age < 18) {
                ageError.style.display = 'block';
                return false; // Prevent form submission
            }
            ageError.style.display = 'none';
            return true; // Allow form submission
        }
    </script>
</head>
<body>
    <nav>
        <ul>
            <li><a href="{{ url_for('home') }}">Home</a></li>
            <li><a href="{{ url_for('about') }}">About</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
    <h2>Register</h2>
    <form method="POST" onsubmit="return validateAge()">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required><br>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required><br>
        <label for="age">Age:</label>
        <input type="number" id="age" name="age" required><br>
        <div id="age-error" style="color: red; display: none;">*You must be at least 18 years old to register an adult account.</div>
        <button type="submit">Register</button>
    </form>
    <a href="{{ url_for('login') }}">Already have an account? Log in here</a>
</body>
</html>
