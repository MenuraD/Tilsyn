<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../static/design/main.css">
    <title>Register</title>
    <script>
        function validateAge() {
            const ageInput = document.getElementById('age');
            const ageError = document.getElementById('age-error');
            const age = parseInt(ageInput.value, 10);

            if (isNaN(age) || age < 18) {
                ageError.style.display = 'block';
                return false;
            }
            ageError.style.display = 'none';
            return true;
        }
    </script>
</head>
<body>
    <nav>
        <ul>
            <li><a href="{{ url_for('home') }}">Home</a></li>
            <li><a href="{{ url_for('about') }}">About</a></li>
            <li><a href="{{ url_for('services') }}">Services</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
    <div class="registration-page">
        <div class="registration-card">
            <h2 class="registration-title">Register</h2>
            <form method="POST" onsubmit="return validateAge()" class="registration-form">
                <div class="form-group">
                    <input type="text" id="username" name="username" required>
                    <label for="username">Username</label>
                </div>
                <div class="form-group">
                    <input type="password" id="password" name="password" required>
                    <label for="password">Password</label>
                </div>
                <div class="form-group">
                    <input type="number" id="age" name="age" required>
                    <label for="age">Age</label>
                </div>
                <div id="age-error" class="error-message">*You must be at least 18 years old to register an adult account.</div>
                <button type="submit" class="submit-btn">Create Account</button>
            </form>
            <div class="auth-link">
                <span>Already have an account?</span>
                <a href="{{ url_for('login') }}">Log in here</a>
            </div>
        </div>
    </div>
</body>
</html>
