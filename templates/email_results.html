<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Registrations</title>
    <link rel="stylesheet" href="../static/design/main.css">
    <script>
        // Refresh the page every second (1000 milliseconds)
        setInterval(function () {
            location.reload();
        }, 2000);
    </script>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 10px;
            border: 1px solid #ccc;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
    <h2>Email Registrations</h2>
    <table>
        <tr>
            <th>Email</th>
            <th>Website</th>
        </tr>
        {% for email in emails %}
        <tr>
            <td>{{ email.email }}</td>
            <td>{{ email.url }}</td>
        </tr>
        {% endfor %}
    </table>
    <h2>Tracked Emails</h2>
    <ul>
    {% for email in emails %}
    <li>Email: {{ email.email }} | Website: {{ email.url }}</li>
    {% endfor %}
    </ul>
    <a href="{{ url_for('logout') }}">Logout</a>
</body>
</html>
