<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Results</title>
</head>
<body>
    <h1>Results for {{ email }}</h1>
    {% if registered_sites %}
        <h3>Registered on the following sites:</h3>
        <ul>
            {% for site in registered_sites %}
                <li>{{ site }}</li>
            {% endfor %}
        </ul>
    {% else %}
        <h3>No registration found for this email.</h3>
    {% endif %}
    <a href="/email_tracker">Check another email</a>
    <br><br>
    <a href="/dashboard">Go back to dashboard</a>
</body>
</html>
