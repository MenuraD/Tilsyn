<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Registrations</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 10px;
            border: 1px solid #ccc;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
    <h1>Email Registrations</h1>
    <table>
        <tr>
            <th>Email</th>
            <th>Website</th>
            <th>Timestamp</th>
        </tr>
        {% for reg in registrations %}
        <tr>
            <td>{{ reg.email }}</td>
            <td>{{ reg.url }}</td>
            <td>{{ reg.timestamp }}</td>
        </tr>
        {% endfor %}
    </table>
    <a href="{{ url_for('logout') }}">Logout</a>
</body>
</html>
